{% extends "base.html" %}
{% block title %}{{ 'Edit Technology' if tech else 'Add Technology' }} — InkWell{% endblock %}

{% block content %}
<div class="page-hero">
  <div class="container">
    <h1><i class="bi bi-cpu me-3"></i>{{ 'Edit Technology' if tech else 'Add a Technology' }}</h1>
  </div>
</div>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card" style="border-radius:16px;">
          <div class="card-body p-4">
            <form method="POST">
              <div class="mb-3">
                <label for="name">Technology Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control mt-1" id="name" name="name"
                       placeholder="e.g. React, PostgreSQL, Docker…"
                       value="{{ tech.name if tech else '' }}" required />
              </div>

              <div class="mb-3">
                <label for="category">Category</label>
                <select class="form-select mt-1" id="category" name="category">
                  {% for cat in ['Frontend','Backend','Database','DevOps','Mobile','AI/ML','Other'] %}
                  <option value="{{ cat }}" {% if tech and tech.category == cat %}selected{% endif %}>{{ cat }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="mb-4">
                <label for="description">Description <span class="text-muted fw-normal">(optional)</span></label>
                <textarea class="form-control mt-1" id="description" name="description" rows="3"
                          placeholder="How do you use this technology?">{{ tech.description if tech else '' }}</textarea>
              </div>

              <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary fw-bold px-4">
                  <i class="bi bi-{{ 'check' if tech else 'plus-lg' }} me-2"></i>{{ 'Update Technology' if tech else 'Add Technology' }}
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
