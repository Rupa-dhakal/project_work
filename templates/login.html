{% extends "base.html" %}
{% block title %}Login — InkWell{% endblock %}

{% block content %}
<section class="py-5" style="min-height:80vh; display:flex; align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
          <div style="width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,#0d2b6e,#2d6ef0); color:#fff; font-size:1.8rem; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;">
            <i class="bi bi-box-arrow-in-right"></i>
          </div>
          <h2 style="font-family:'Playfair Display',serif; color:#0d2b6e;">Welcome Back</h2>
          <p class="text-muted">Log in to your InkWell account</p>
        </div>

        <div class="card" style="border-radius:16px; padding:2rem;">
          <form method="POST" id="loginForm" novalidate>

            <div class="mb-3">
              <label for="username">Username</label>
              <div class="input-group mt-1">
                <span class="input-group-text" style="background:#e8f0fe;"><i class="bi bi-person" style="color:#1a4fad;"></i></span>
                <input type="text" class="form-control" id="username" name="username" placeholder="your_username" required
                       value="{{ request.form.get('username','') }}" />
              </div>
            </div>

            <div class="mb-4">
              <label for="password">Password</label>
              <div class="input-group mt-1">
                <span class="input-group-text" style="background:#e8f0fe;"><i class="bi bi-lock" style="color:#1a4fad;"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Your password" required />
                <button class="btn btn-outline-secondary" type="button" id="togglePw">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
              </div>
              <div class="invalid-feedback d-none" id="login-err">Please enter your username and password.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="font-size:1rem;">
              <i class="bi bi-box-arrow-in-right me-2"></i>Log In
            </button>
          </form>

          <p class="text-center mt-3 mb-0" style="font-size:.9rem;">
            Don't have an account? <a href="{{ url_for('register') }}" style="font-weight:700;">Sign up free</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    icon.className = pw.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) {
      document.getElementById('login-err').classList.remove('d-none');
      e.preventDefault();
    }
  });
</script>
{% endblock %}
