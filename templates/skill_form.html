{% extends "base.html" %}
{% block title %}{{ 'Edit Skill' if skill else 'Add Skill' }} — InkWell{% endblock %}

{% block content %}
<div class="page-hero">
  <div class="container">
    <h1><i class="bi bi-stars me-3"></i>{{ 'Edit Skill' if skill else 'Add a Skill' }}</h1>
  </div>
</div>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card" style="border-radius:16px;">
          <div class="card-body p-4">
            <form method="POST">
              <div class="mb-3">
                <label for="name">Skill Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control mt-1" id="name" name="name"
                       placeholder="e.g. Python, Graphic Design, Public Speaking…"
                       value="{{ skill.name if skill else '' }}" required />
              </div>

              <div class="mb-3">
                <label for="level">Proficiency Level</label>
                <select class="form-select mt-1" id="level" name="level">
                  {% for lvl in ['Beginner','Intermediate','Advanced'] %}
                  <option value="{{ lvl }}" {% if skill and skill.level == lvl %}selected{% endif %}>{{ lvl }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="mb-4">
                <label for="description">Brief Description <span class="text-muted fw-normal">(optional)</span></label>
                <textarea class="form-control mt-1" id="description" name="description" rows="3"
                          placeholder="A little about how you use this skill…">{{ skill.description if skill else '' }}</textarea>
              </div>

              <div class="d-flex gap-3">
                <button type="submit" class="btn btn-success fw-bold px-4">
                  <i class="bi bi-{{ 'check' if skill else 'plus-lg' }} me-2"></i>{{ 'Update Skill' if skill else 'Add Skill' }}
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
